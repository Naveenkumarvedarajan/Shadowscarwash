<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadows Car Wash</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131c;--card:#1a1a27;--border:#2a2a40;--accent:#00d4ff;--accent2:#0099cc;--gold:#f0c040;--text:#e8e8f0;--muted:#6b6b88;--success:#00e676;--danger:#ff5252;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,255,0.07),transparent 60%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:36px 18px 80px;}
.header{text-align:center;margin-bottom:28px;}
#logo{width:130px;height:130px;object-fit:contain;border-radius:50%;box-shadow:0 0 50px rgba(0,212,255,0.2);margin-bottom:6px;}
.tagline{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:20px;overflow-x:auto;}
.tab{flex:1;min-width:80px;padding:9px 6px;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--card);color:var(--accent);border:1px solid var(--border);}
.panel{display:none;} .panel.active{display:block;}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:16px;}
.ctitle{font-family:"Bebas Neue",cursive;font-size:17px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:16px 0 10px;}
/* Fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.field input.upper{text-transform:uppercase;letter-spacing:1px;}
.field input::placeholder{text-transform:none;letter-spacing:0;color:var(--muted);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--card);}
.field textarea{resize:vertical;min-height:80px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* Buttons */
.btn{width:100%;padding:12px;border-radius:11px;border:none;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:5px;display:block;}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.bp:hover{box-shadow:0 5px 20px rgba(0,212,255,.35);transform:translateY(-1px);}
.bg{background:linear-gradient(135deg,var(--gold),#d4900a);color:#000;}
.bg:hover{box-shadow:0 5px 20px rgba(240,192,64,.3);transform:translateY(-1px);}
.bt{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;}
.bt:hover{border-color:var(--accent);color:var(--accent);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,212,255,.25);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes sp{to{transform:rotate(360deg)}}
/* Result card */
.rcard{background:var(--surface);border:1px solid rgba(0,212,255,.25);border-radius:18px;padding:22px;margin-bottom:14px;}
/* Tier badges */
.tp{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.3);}
.tg{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);}
.ts{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(192,192,192,.12);color:#c0c0c0;border:1px solid rgba(192,192,192,.3);}
.tb{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(205,127,50,.14);color:#cd7f32;border:1px solid rgba(205,127,50,.3);}
/* Progress */
.prog-bg{background:var(--card);border-radius:99px;height:7px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .8s ease;}
/* Reward box */
.reward-box{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);border-radius:12px;padding:14px;margin:14px 0;}
/* Chart */
.chart{display:flex;align-items:flex-end;gap:10px;padding:10px 0;min-height:80px;}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.bar{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:5px 5px 0 0;min-height:4px;transition:height .6s ease;}
.bar-val{font-size:11px;font-weight:600;color:var(--accent);}
.bar-label{font-size:10px;color:var(--muted);text-align:center;}
/* History table */
.htable{width:100%;border-collapse:collapse;}
.htable th{font-size:10px;text-transform:uppercase;color:var(--muted);padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);}
.htable td{padding:8px;font-size:13px;border-bottom:1px solid rgba(42,42,64,.5);color:var(--text);}
.htable tr:last-child td{border-bottom:none;}
.wnum{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-size:10px;font-weight:700;}
/* WhatsApp & Print */
.wa-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid rgba(0,230,118,.3);background:rgba(0,230,118,.05);color:var(--success);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;}
.wa-btn:hover{background:rgba(0,230,118,.12);}
.print-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid rgba(240,192,64,.3);background:rgba(240,192,64,.05);color:var(--gold);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.print-btn:hover{background:rgba(240,192,64,.12);}
/* Excel button */
.ebtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;border-radius:11px;border:1px solid rgba(0,230,118,.3);background:rgba(0,230,118,.05);color:var(--success);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.ebtn:hover{background:rgba(0,230,118,.1);}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
/* Test box */
.tbox{border-radius:11px;padding:13px;margin-top:11px;font-size:12px;line-height:1.9;display:none;}
.tbox.show{display:block;background:var(--card);border:1px solid var(--border);}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 20px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap;max-width:92vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(0,230,118,.5);color:var(--success);}
.toast.err{border-color:rgba(255,82,82,.5);color:var(--danger);}
@media(max-width:500px){.row2,.dash-grid{grid-template-columns:1fr;}.tabs{gap:3px;}.tab{font-size:11px;padding:8px 4px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img id="logo" alt="Shadows Car Wash">
    <p class="tagline">Membership Portal</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="t0">&#128269; Membership</button>
    <button class="tab" id="t1">&#128295; Staff</button>
    <button class="tab" id="t2">&#128101; Customers</button>
    <button class="tab" id="t3">&#128202; Dashboard</button>
    <button class="tab" id="t4">&#128241; WhatsApp</button>
  </div>

  <!-- ── CUSTOMER TAB ── -->
  <div class="panel active" id="p0">
    <div class="card">
      <div class="ctitle">Check Your Wash Count</div>
      <div class="field">
        <label>Vehicle Number</label>
        <input id="cv" class="upper" type="text" placeholder="e.g. TN01AB1234" maxlength="15">
      </div>
      <button class="btn bp" id="cbtn">Check Membership</button>
      <button class="btn bt" id="tbtn" style="margin-top:8px">&#128295; Test Connection</button>
      <div class="tbox" id="tbox"></div>
    </div>
    <div id="cres"></div>
  </div>

  <!-- ── STAFF TAB ── -->
  <div class="panel" id="p1">
    <div class="card">
      <div class="ctitle">&#10022; Record a Wash</div>
      <div class="field">
        <label>Vehicle Number</label>
        <input id="av" class="upper" type="text" placeholder="TN01AB1234" maxlength="15">
      </div>
      <div class="row2">
        <div class="field">
          <label>Service Type</label>
          <select id="svctype">
            <option value="Basic">Basic Wash</option>
            <option value="Premium">Premium Wash</option>
            <option value="Full Detail">Full Detail</option>
          </select>
        </div>
        <div class="field">
          <label>Amount (&#8377;)</label>
          <input id="payamt" type="number" placeholder="e.g. 299">
        </div>
      </div>
      <button class="btn bp" id="awbtn">Add Wash + Save to Sheet</button>
    </div>
    <div class="card">
      <div class="ctitle">&#65291; Register New Customer</div>
      <div class="field"><label>Full Name</label><input id="an" type="text" placeholder="Customer name"></div>
      <div class="row2">
        <div class="field"><label>Vehicle Number</label><input id="anv" class="upper" type="text" placeholder="TN01AB1234" maxlength="15"></div>
        <div class="field"><label>Phone</label><input id="aph" type="text" placeholder="10-digit" maxlength="10"></div>
      </div>
      <button class="btn bg" id="arbtn">Register &amp; Record 1st Wash</button>
    </div>
    <div class="card">
      <div class="ctitle">&#128202; Export Data</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Download all wash data as Excel.</p>
      <button class="ebtn" id="exbtn">&#11015; Download Excel</button>
    </div>
  </div>

  <!-- ── ALL CUSTOMERS TAB ── -->
  <div class="panel" id="p2">
    <div class="card">
      <div class="ctitle">&#128101; All Customers</div>
      <div class="field">
        <label>Search by name or vehicle</label>
        <input id="searchq" type="text" placeholder="Leave empty to show all">
      </div>
      <button class="btn bp" id="searchbtn">&#128269; Search / View All Customers</button>
    </div>
    <div id="searchres"></div>
  </div>

  <!-- ── DASHBOARD TAB ── -->
  <div class="panel" id="p3">
    <div class="card">
      <div class="ctitle">&#128202; Business Dashboard</div>
      <button class="btn bp" id="dashbtn">&#128202; Refresh Dashboard</button>
    </div>
    <div id="dashres"></div>
  </div>

  <!-- ── WHATSAPP TAB ── -->
  <div class="panel" id="p4">
    <div class="card">
      <div class="ctitle">&#128241; Bulk WhatsApp Message</div>
      <div class="field">
        <label>Message to send all customers</label>
        <textarea id="wamsg" placeholder="e.g. Special offer this weekend! Get 20% off on Premium Wash. Visit Shadows Car Wash today!"></textarea>
      </div>
      <button class="btn bg" id="wabtn">&#128241; Send to All Customers</button>
    </div>
    <div id="wares"></div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
